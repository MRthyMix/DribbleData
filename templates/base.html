<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}NBA Analytics{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', filename='images/basketball_favicon.png') }}" type="image/x-icon" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
    {% block head %}{% endblock %}
  </head>

  <body class="bg-gray-900 text-white">

    <div class="text-center pt-4 mb-2">
      <a href="/">
        <img src="/static/images/logo.png" alt="DribbleData" class="mx-auto h-24 hover:opacity-80 transition duration-200" />
      </a>
    </div>

    <nav class="bg-gray-800 border-b border-gray-700 mb-6">
      <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
        <div class="flex space-x-6">
          <a href="/scoreboard"
             class="text-sm font-medium transition {{ 'text-white' if request.endpoint == 'scoreboard' else 'text-gray-400 hover:text-white' }}">
            Scoreboard
          </a>
          <a href="/standings"
             class="text-sm font-medium transition {{ 'text-white' if request.endpoint == 'standings' else 'text-gray-400 hover:text-white' }}">
            Standings
          </a>
          {% if session.get('user') %}
          <a href="/search"
             class="text-sm font-medium transition {{ 'text-white' if request.endpoint == 'search_page' else 'text-gray-400 hover:text-white' }}">
            Search
          </a>
          <a href="/compare"
             class="text-sm font-medium transition {{ 'text-white' if request.endpoint == 'compare_players' else 'text-gray-400 hover:text-white' }}">
            Compare
          </a>
          {% endif %}
        </div>
        <div class="flex items-center space-x-4">
          {% if session.get('user') %}
            <span class="text-gray-400 text-sm">{{ session.get('user') }}</span>
            <a href="/logout" class="text-sm text-red-400 hover:text-red-300 transition">Logout</a>
          {% else %}
            <a href="/login" class="text-sm text-gray-400 hover:text-white transition">Login</a>
            <a href="/signup"
               class="text-sm text-white px-3 py-1 rounded transition"
               style="background-color:#d57240"
               onmouseover="this.style.backgroundColor='#b85423'"
               onmouseout="this.style.backgroundColor='#d57240'">
              Sign Up
            </a>
          {% endif %}
        </div>
      </div>
    </nav>

    {% block content %}{% endblock %}

    <!-- Chatbot -->
    <div id="chatbot-container" class="fixed bottom-6 right-6">
      <button id="chatbot-toggle" class="bg-[#262525] hover:bg-gray-700 text-white p-4 rounded-full flex items-center">
        <img src="/static/images/basketball.png" alt="Basketball" class="h-6 w-6 mr-2" />
        Chat
      </button>

      <div id="chatbot-window" class="hidden fixed bottom-20 right-6 max-w-sm w-full bg-gray-800 rounded shadow-lg overflow-hidden">
        <div class="p-4 border-b border-gray-700">
          <h3 class="text-lg font-bold">How can I help you?</h3>
        </div>

        <div id="chatbot-messages" class="p-4 h-64 overflow-y-auto"></div>

        <form id="chatbot-form" class="flex border-t border-gray-700 items-center">
          <input type="text" id="chatbot-input" placeholder="Type your question..."
                 class="flex-grow p-3 bg-gray-700 text-white outline-none" />
          <button id="chatbot-clear" type="button" class="text-red-400 px-3 hover:text-red-600">Clear</button>
          <button type="submit" class="bg-blue-600 hover:bg-blue-700 p-3">Send</button>
        </form>
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
